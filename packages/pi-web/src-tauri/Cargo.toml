[package]
name = "pi-web-tauri"
version = "0.79.1"
description = "Pi Agent Web desktop host"
authors = ["OpenAI"]
license = "MIT"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "pi_web_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.2", features = [] }

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tauri = { version = "2.11.2", features = [] }
tauri-plugin-opener = "2.5.4"
